<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Celere Web Clipper Settings</title>
    <link rel="stylesheet" href="src/popup.css" />
  </head>
  <body>
    <main>
      <header>
        <span class="mark">C</span>
        <div>
          <h1>Settings</h1>
          <p>Choose where extracted text is delivered.</p>
        </div>
      </header>

      <label class="field">
        <span>Celere app URL</span>
        <input id="app-url" type="url" placeholder="https://the32bitpringle.github.io/celere-2/" />
      </label>

      <label class="field">
        <span>Minimum readable characters</span>
        <input id="min-chars" type="number" min="100" max="5000" step="50" />
      </label>

      <button id="save" type="button">Save settings</button>
      <p id="status" role="status">Ready</p>
    </main>
    <script src="src/options.js"></script>
  </body>
</html>
